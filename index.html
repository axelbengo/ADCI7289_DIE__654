<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
    <title>aksess.com - Accueil</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* DESIGN SOURCE DE VOTRE HEADER */
        :root {
            --itchio_white_back: #141414;
            --itchio_gray_back: #1f1f1f;
            --itchio_body_color: #e2e2e2;
            --itchio_border_color: #333333;
            --itchio_link_color: #fa5c5c;
        }
        body { background-color: var(--itchio_white_back) !important; color: var(--itchio_body_color) !important; margin: 0; font-family: Lato, sans-serif; }
        
        .header_widget .primary_header {
            background-color: #1b1b1b !important;
            border-bottom: 1px solid var(--itchio_border_color);
            display: flex; align-items: center; height: 50px; padding: 0 20px;
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
        }
        .header_spacer { height: 50px; }
        .header_logo { color: #fa5c5c !important; text-decoration: none; font-weight: 900; font-size: 22px; margin-right: 25px; }
        .header_buttons { display: flex; gap: 15px; }
        .header_button { color: #aaaaaa !important; text-decoration: none; font-size: 14px; font-weight: bold; }
        
        /* BARRE DE RECHERCHE */
        .game_search { flex: 1; max-width: 400px; margin-left: 20px; }
        .search_input { width: 100%; background: #111 !important; border: 1px solid #333 !important; border-radius: 3px; padding: 6px 10px; color: white; font-size: 13px; }
        
        /* PANEL UTILISATEUR */
        .user_panel_widget { margin-left: auto; display: flex; align-items: center; gap: 12px; }
        .panel_button { color: #e2e2e2 !important; text-decoration: none; font-size: 14px; font-weight: bold; padding: 5px 12px; border-radius: 3px; border: 1px solid #444; background: transparent; cursor: pointer; }
        .register_button { background-color: #fa5c5c !important; border-color: #fa5c5c !important; color: white !important; }

        .inner_column { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* GRILLE DE JEUX */
        .game_grid_widget {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .game_cell { background: #1b1b1b; border-radius: 4px; overflow: hidden; transition: transform 0.2s; border: 1px solid #333; }
        .game_cell:hover { transform: translateY(-5px); }
        .game_cell .bordered { aspect-ratio: 315 / 250; background: #000; overflow: hidden; }
        .game_cell img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .game_cell .label { padding: 15px; }
        .price_tag { float: right; background: #fa5c5c; padding: 2px 6px; border-radius: 3px; font-weight: bold; color: white; font-size: 12px; }
        .title { color: white; font-weight: bold; text-decoration: none; font-size: 16px; display: block; margin-bottom: 5px; }
        .sub { color: #888; font-size: 13px; }
        
        .footer { text-align: center; padding: 40px 0; color: #555; font-size: 14px; border-top: 1px solid #333; margin-top: 50px; }
    </style>
</head>
<body>
    <div class="header_spacer"></div>
    <div class="header_widget">
        <div class="primary_header">
            <a class="header_logo" href="index.html">aksess.com</a>
            <div class="header_buttons">
                <a class="header_button" href="browse.html">Browse Games</a>
            </div>
            
            <!-- RECHERCHE : Envoie vers browse.html?q=... -->
            <form action="browse.html" method="GET" class="game_search">
				<input type="text" name="q" class="search_input" placeholder="Rechercher titre, tag, genre...">
			</form>


            <div class="user_panel_widget" id="user-panel">
                <!-- Rempli par le JavaScript -->
            </div>
        </div>
    </div>

    <div class="main inner_column">
        <div class="browse_header" style="padding: 20px 0;">
            <h2 style="font-size: 24px;">
                <span>Derniers</span> <span>Jeux</span>
                <span id="game-count" style="font-weight: normal; color: #777;"></span>
            </h2>
        </div>

        <div id="game-grid" class="game_grid_widget">
            <p>Chargement des jeux...</p>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2024 Aksess - Tous droits réservés</p>
    </footer>

    <script type="module">
        import { SUPABASE_URL, SUPABASE_KEY } from './js/config.js';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function init() {
            // 1. GESTION DU HEADER (AUTHENTIFICATION ET ADMIN)
            const { data: { user } } = await supabase.auth.getUser();
            const panel = document.getElementById('user-panel');
            
            if (user) {
                // On vérifie si l'utilisateur est admin via la table 'admins'
                const { data: adminData } = await supabase
                    .from('admins')
                    .select('user_id')
                    .eq('user_id', user.id)
                    .single();

                panel.innerHTML = `
                    <a href="user_account.html" class="panel_button">${user.user_metadata.display_name || 'Compte'}</a>
                    ${adminData ? '<a href="upload.html" class="panel_button" style="color:#fa5c5c; border-color:#fa5c5c;">Upload</a>' : ''}
                    <button id="logout-btn" class="panel_button" style="background:none; cursor:pointer;">Log out</button>
                `;

                document.getElementById('logout-btn').onclick = async () => {
                    await supabase.auth.signOut();
                    window.location.reload();
                };
            } else {
                // Liens vers login.html et register.html (Correction des liens relatifs)
                panel.innerHTML = `
                    <a href="login.html" class="panel_button">Log in</a>
                    <a href="register.html" class="panel_button register_button">Register</a>
                `;
            }

            // 2. CHARGEMENT DES JEUX
            const { data: games, error } = await supabase
                .from('games')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error("Erreur:", error);
                document.getElementById('game-grid').innerHTML = "<p>Erreur lors du chargement des jeux.</p>";
                return;
            }

            document.getElementById('game-count').innerText = ` (${games.length} résultats)`;
            const grid = document.getElementById('game-grid');
            
            if (games.length === 0) {
                grid.innerHTML = "<p>Aucun jeu disponible pour le moment.</p>";
                return;
            }

            grid.innerHTML = games.map(game => `
                <div class="game_cell">
                    <div class="bordered">
                        <a href="game.html?slug=${game.slug}">
                            <img src="${game.cover_image}" alt="${game.title}">
                        </a>
                    </div>
                    <div class="label">
                        <span class="price_tag">${game.price} $</span>
                        <a class="title" href="game.html?slug=${game.slug}">${game.title}</a>
                        <div class="sub">${game.short_text}</div>
                    </div>
                </div>
            `).join('');
        }

        init();
    </script>
</body>
</html>
