<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
    <title>aksess.com - Game Details</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --itchio_white_back: #141414; --itchio_border_color: #333333; --itchio_link_color: #fa5c5c; }
        body { background-color: var(--itchio_white_back); color: #e2e2e2; margin: 0; font-family: Lato, sans-serif; }
        .header_spacer { height: 50px; }
        .primary_header { background-color: #1b1b1b; border-bottom: 1px solid var(--itchio_border_color); display: flex; align-items: center; height: 50px; padding: 0 20px; position: fixed; top: 0; left: 0; right: 0; z-index: 1000; }
        .header_logo { color: #fa5c5c; text-decoration: none; font-weight: 900; font-size: 22px; }
        .inner_column { max-width: 960px; margin: 0 auto; padding: 20px; }
        
        /* ZONE DE PRESENTATION */
        .game_hero {
            width: 100%;
            height: 400px;
            background-size: cover;
            background-position: center;
            border-radius: 8px;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin: 20px 0;
            overflow: hidden;
        }
        .game_hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
        }
        .hero_content { position: relative; z-index: 1; text-align: center; }
        
        .button.play {
            background: #fa5c5c;
            color: white;
            border: none;
            padding: 20px 50px;
            border-radius: 4px;
            font-weight: 900;
            font-size: 20px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.2s, background 0.2s;
        }
        .button.play:hover { transform: scale(1.05); background: #ff6b6b; }

        .formatted.game_description { padding: 30px 0; border-top: 1px solid #333; margin-top: 20px; }
        h1 { font-size: 32px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="header_spacer"></div>
    <div class="primary_header">
		<a class="header_logo" href="index.html">aksess.com</a>
		<div class="header_buttons">
			<a class="header_button" href="browse.html">Browse Games</a>
		</div>
		<!-- RECHERCHE : Envoie vers browse.html?q=... -->
		<form action="browse.html" method="GET" class="game_search">
			<input type="text" name="q" class="search_input" placeholder="Rechercher titre, tag, genre...">
		</form>
	</div>

    <div class="main inner_column">
        <div id="game-info">
            <h1 id="game-title">Chargement...</h1>
            <div id="game-hero" class="game_hero">
                <div class="hero_content">
                    <a id="play-link" href="#" class="button play">LANCER LE JEU</a>
                </div>
            </div>

            <div class="formatted game_description">
                <h3>Description</h3>
                <p id="game-desc" style="line-height: 1.6; color: #bbb;"></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { SUPABASE_URL, SUPABASE_KEY } from './js/config.js';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const params = new URLSearchParams(window.location.search);
        const slug = params.get('slug');

        async function loadGame() {
            if(!slug) { window.location.href = "index.html"; return; }

            const { data: game, error } = await supabase.from('games').select('*').eq('slug', slug).single();
            
            if(error || !game) {
                document.getElementById('game-title').innerText = "Jeu non trouvé";
                document.getElementById('game-hero').style.display = 'none';
                return;
            }

            // Mise à jour de l'interface
            document.title = game.title + " - aksess.com";
            document.getElementById('game-title').innerText = game.title;
            document.getElementById('game-desc').innerText = game.description;
            
            // Image de fond pour le "Hero"
            document.getElementById('game-hero').style.backgroundImage = `url('${game.cover_image}')`;
            
            // LIEN DE REDIRECTION DIRECTE
            // On pointe vers le dossier du jeu. GitHub Pages chargera index.html automatiquement.
            document.getElementById('play-link').href = `./games/${game.slug}/`;
        }

        loadGame();
    </script>
</body>
</html>
