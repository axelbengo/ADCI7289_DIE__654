<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris Flashy</title>
    <style>
        body {
            background: #111;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 2.5em;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #ff0055, #00ffcc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(255,255,255,0.1);
        }

        #game-container {
            display: flex;
            align-items: center;
            gap: 20px;
            background: #222;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 255, 200, 0.2);
            border: 2px solid #333;
        }

        canvas {
            border: 4px solid #00ffcc;
            background: #111;
            box-shadow: 0 0 15px rgba(0, 255, 200, 0.1);
        }

        #sidebar {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 15px;
            font-size: 1.2em;
        }

        .stat-box {
            background: #333;
            padding: 10px 20px;
            border-radius: 8px;
            width: 120px;
            border-left: 5px solid #ff0055;
        }

        .stat-label {
            font-size: 0.8em;
            color: #aaa;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #00ffcc;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background: #ff0055;
            color: white;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
        }

        button:hover {
            background: #ff3377;
            transform: scale(1.05);
        }

        #music-controls {
            margin-top: 10px;
            font-size: 0.8em;
            color: #888;
        }
    </style>
</head>
<body>

    <h1>Tetris</h1>

    <div id="game-container">
        <canvas id="tetris" width="240" height="400"></canvas>
        
        <div id="sidebar">
            <div class="stat-box">
                <div class="stat-label">Score</div>
                <div id="score" class="stat-value">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Lignes</div>
                <div id="lines" class="stat-value">0</div>
            </div>
            <button id="start-btn">Jouer</button>
            
            <div id="music-controls">
                <label>
                    <input type="checkbox" id="music-toggle"> 🎵 Musique
                </label>
            </div>
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="tetris.mp3" type="audio/mpeg">
        Votre navigateur ne supporte pas l'audio.
    </audio>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const musicToggle = document.getElementById('music-toggle');
        const bgMusic = document.getElementById('bg-music');

        context.scale(20, 20); 

        // État de la pause
        let isPaused = false;

        const colors = [
            null,
            '#ff0055', 
            '#00ffcc', 
            '#ffcc00', 
            '#ff00ff', 
            '#00ff00', 
            '#0000ff', 
            '#ffffff'  
        ];

        const arena = createMatrix(12, 20);
        const player = {
            pos: {x: 0, y: 0},
            matrix: null,
            score: 0,
            lines: 0
        };

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 &&
                       (arena[y + o.y] &&
                        arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) {
                matrix.push(new Array(w).fill(0));
            }
            return matrix;
        }

        function createPiece(type) {
            if (type === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
            else if (type === 'L') return [[0,2,0],[0,2,0],[0,2,2]];
            else if (type === 'J') return [[0,3,0],[0,3,0],[3,3,0]];
            else if (type === 'O') return [[4,4],[4,4]];
            else if (type === 'Z') return [[5,5,0],[0,5,5],[0,0,0]];
            else if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
            else if (type === 'T') return [[0,7,0],[7,7,7],[0,0,0]];
        }

        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        context.fillStyle = colors[value];
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                        context.strokeStyle = '#111';
                        context.lineWidth = 0.05;
                        context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function draw() {
            context.fillStyle = '#111';
            context.fillRect(0, 0, canvas.width, canvas.height);

            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
                updateScore();
            }
            dropCounter = 0;
        }

        function playerMove(offset) {
            player.pos.x += offset;
            if (collide(arena, player)) {
                player.pos.x -= offset;
            }
        }

        function playerReset() {
            const pieces = 'TJLOSZI';
            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            
            if (collide(arena, player)) {
                arena.forEach(row => row.fill(0));
                player.score = 0;
                player.lines = 0;
                updateScore();
            }
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) matrix.forEach(row => row.reverse());
            else matrix.reverse();
        }

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) {
                        continue outer;
                    }
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;

                player.score += rowCount * 10;
                player.lines++;
                rowCount *= 2;
            }
        }

        let dropCounter = 0;
        let dropInterval = 1000; 
        let lastTime = 0;

        // 🛠️ LA BOUCLE PRINCIPALE MODIFIÉE
        function update(time = 0) {
            if (isPaused) {
                return; // On stoppe l'animation si en pause
            }

            const deltaTime = time - lastTime;
            lastTime = time;

            dropCounter += deltaTime;
            if (dropCounter > dropInterval) {
                playerDrop();
            }

            draw();
            requestAnimationFrame(update);
        }

        function updateScore() {
            document.getElementById('score').innerText = player.score;
            document.getElementById('lines').innerText = player.lines;
        }

        // Contrôles au clavier (Bloqués si pause active)
        document.addEventListener('keydown', event => {
            if (isPaused) return; // 🛠️ Sécurité : empêche de jouer pendant la pause

            if (event.key === 'ArrowLeft') {
                playerMove(-1);
            } else if (event.key === 'ArrowRight') {
                playerMove(1);
            } else if (event.key === 'ArrowDown') {
                playerDrop();
            } else if (event.key === 'Q' || event.key === 'q' || event.key === 'ArrowUp') {
                playerRotate(1);
            }
        });

        musicToggle.addEventListener('change', () => {
            if (musicToggle.checked && !isPaused) {
                bgMusic.play().catch(e => console.log("Musique bloquée."));
            } else {
                bgMusic.pause();
            }
        });

        startBtn.addEventListener('click', () => {
            playerReset();
            updateScore();
            isPaused = false;
            update();
            startBtn.blur(); 
            startBtn.style.display = 'none'; 
        });

        // 🛠️ FONCTIONS GLOBALEMENT EXPOSÉES POUR TON SITE
        window.pause_game = function() {
            if (!isPaused) {
                isPaused = true;
                console.log("Le jeu est en PAUSE.");
                
                bgMusic.pause();
                
                // Effet visuel "Pause" sur le canvas
                // On utilise des coordonnées réelles (calculées hors du scale initial)
                context.save();
                context.setTransform(1, 0, 0, 1, 0, 0); 
                context.fillStyle = 'rgba(0, 0, 0, 0.6)';
                context.fillRect(0, 0, canvas.width, canvas.height);
                context.fillStyle = '#00ffcc';
                context.font = 'bold 24px Arial';
                context.textAlign = 'center';
                context.fillText('PAUSE', canvas.width / 2, canvas.height / 2);
                context.restore();
            }
        };

        window.resume_game = function() {
            if (isPaused) {
                isPaused = false;
                console.log("Le jeu REPREND.");
                
                if (musicToggle.checked) {
                    bgMusic.play().catch(e => {});
                }
                
                // Relance proprement le timing et la boucle
                lastTime = performance.now();
                update();
            }
        };

        window.toggle_pause = function() {
            if (isPaused) {
                window.resume_game();
            } else {
                window.pause_game();
            }
        };

    </script>
</body>
</html>
